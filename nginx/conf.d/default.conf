server {
    listen 80 default_server;
    server_name _;

    # 单IP并发连接上限（50条）+ 全局并发连接上限（防止资源耗尽，按实际峰值容量调整）
    limit_conn safeline_conn_per_ip 50;
    limit_conn safeline_conn_total  10000;

    # 单IP请求速率：50r/s 稳定，burst=30 短窗口最多透过30条（之前200太宽松）
    # nodelay：burst 内的请求也立即处理而不是排队，配合 limit_req_status 444 快速拒绝
    limit_req zone=safeline_req_per_ip burst=30 nodelay;

    location = /_reload {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        default_type application/json;
        content_by_lua_block {
            local cjson = require "cjson"
            local expected_token = tostring(os.getenv("JWT_SECRET") or "")
            local provided_token = tostring((ngx.req.get_headers() or {})["X-Reload-Token"] or "")

            if expected_token == "" then
                ngx.status = 500
                ngx.say(cjson.encode({
                    success = false,
                    message = "Reload token is not configured"
                }))
                return
            end

            if provided_token ~= expected_token then
                ngx.status = 403
                ngx.say(cjson.encode({
                    success = false,
                    message = "Forbidden"
                }))
                return
            end

            local function command_ok(ok, reason, code)
                return (ok == true) or (ok == 0) or (reason == "exit" and code == 0)
            end

            local function execute_command_with_output(command)
                local pipe = io.popen(command .. " 2>&1")
                if not pipe then
                    return false, {
                        command = command,
                        raw_ok = "nil",
                        raw_reason = "popen_failed",
                        raw_code = "nil",
                        output = "failed to start command"
                    }
                end

                local output = pipe:read("*a") or ""
                local ok, reason, code = pipe:close()
                return command_ok(ok, reason, code), {
                    command = command,
                    raw_ok = tostring(ok),
                    raw_reason = tostring(reason),
                    raw_code = tostring(code),
                    output = output
                }
            end

            local function build_syntax_test_config(prefix)
                local source_path = prefix .. "conf/nginx.conf"
                local source = io.open(source_path, "r")
                if not source then
                    return nil, "failed to open nginx.conf for syntax test"
                end

                local content = source:read("*a") or ""
                source:close()

                local temp_pid_path = string.format(
                    "/tmp/nginx-syntax-test-%s-%s.pid",
                    tostring(ngx.worker.pid()),
                    tostring(ngx.now()):gsub("%.", "_")
                )

                local function absolutize_line(line)
                    if line:match("^%s*pid%s+[^;]+;%s*$") then
                        return "pid " .. temp_pid_path .. ";"
                    end

                    line = line:gsub(
                        "^([%s]*include%s+)mime%.types([%s]*;[%s]*)$",
                        "%1" .. prefix .. "conf/mime.types%2"
                    )
                    line = line:gsub(
                        "^([%s]*include%s+)conf%.d/%*%.conf([%s]*;[%s]*)$",
                        "%1" .. prefix .. "conf/conf.d/*.conf%2"
                    )
                    line = line:gsub(
                        "^([%s]*init_by_lua_file%s+)lua/init%.lua([%s]*;[%s]*)$",
                        "%1" .. prefix .. "lua/init.lua%2"
                    )
                    line = line:gsub(
                        "^([%s]*init_worker_by_lua_file%s+)lua/init_worker%.lua([%s]*;[%s]*)$",
                        "%1" .. prefix .. "lua/init_worker.lua%2"
                    )

                    return line
                end

                local lines = {}
                for line in (content .. "\n"):gmatch("(.-)\r?\n") do
                    if line ~= "" or #lines > 0 then
                        local rewritten = absolutize_line(line)
                        if rewritten ~= nil then
                            table.insert(lines, rewritten)
                        end
                    end
                end

                local sanitized = table.concat(lines, "\n")
                if sanitized ~= "" then
                    sanitized = sanitized .. "\n"
                end

                local temp_path = string.format(
                    "/tmp/nginx-syntax-test-%s-%s.conf",
                    tostring(ngx.worker.pid()),
                    tostring(ngx.now()):gsub("%.", "_")
                )
                local target = io.open(temp_path, "w")
                if not target then
                    return nil, "failed to create temporary nginx syntax config"
                end

                target:write(sanitized)
                target:close()
                return {
                    config_path = temp_path,
                    pid_path = temp_pid_path
                }
            end

            local function remove_file_silent(file_path)
                if not file_path or file_path == "" then
                    return
                end

                os.remove(file_path)
            end

            local nginx_ok = false
            local nginx_err = nil
            local reload_detail = {
                attempts = setmetatable({}, cjson.array_mt)
            }

            local prefix = ngx.config.prefix()
            local pid_path = "/tmp/nginx.pid"
            local f = io.open(pid_path, "r")
            local pid = f and f:read("*l") or nil
            if f then f:close() end
            reload_detail.pid = pid
            reload_detail.pid_path = pid_path

            local syntax_test_artifacts, syntax_test_config_err = build_syntax_test_config(prefix)
            local syntax_test_config = syntax_test_artifacts and syntax_test_artifacts.config_path or nil
            local syntax_test_pid_path = syntax_test_artifacts and syntax_test_artifacts.pid_path or nil
            reload_detail.syntax_test_config = syntax_test_config
            reload_detail.syntax_test_pid_path = syntax_test_pid_path
            reload_detail.syntax_test_config_error = syntax_test_config_err

            local syntax_ok = false
            local syntax_detail = nil
            if syntax_test_config then
                local syntax_test_command = "/usr/local/openresty/bin/openresty -t -e stderr -p " .. prefix .. " -c " .. syntax_test_config
                syntax_ok, syntax_detail = execute_command_with_output(syntax_test_command)
            else
                syntax_detail = {
                    command = "build_syntax_test_config",
                    raw_ok = "false",
                    raw_reason = "config_build_failed",
                    raw_code = "nil",
                    output = syntax_test_config_err or "failed to prepare nginx syntax test config"
                }
            end
            reload_detail.syntax_test = syntax_detail
            remove_file_silent(syntax_test_config)
            remove_file_silent(syntax_test_pid_path)

            if not syntax_ok then
                nginx_err = "nginx config test failed"
            else
                local commands = {}
                if pid and pid:match("^%d+$") and pid ~= "1" then
                    table.insert(commands, "/usr/local/bin/nginx-hup " .. pid)
                end
                table.insert(commands, "/usr/local/bin/nginx-hup 1")

                for _, command in ipairs(commands) do
                    local ok, detail = execute_command_with_output(command)
                    table.insert(reload_detail.attempts, detail)
                    if ok then
                        nginx_ok = true
                        break
                    end
                end

                if not nginx_ok then
                    nginx_err = "nginx reload command failed"
                end
            end

            if nginx_ok then
                ngx.say(cjson.encode({
                    success = true,
                    message = "Configuration reloaded"
                }))
                return
            end

            ngx.status = 500
            ngx.say(cjson.encode({
                success = false,
                message = "Failed to reload configuration",
                nginx_reloaded = nginx_ok,
                nginx_error = nginx_err,
                nginx_detail = reload_detail
            }))
        }
    }

    location = /_metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        default_type application/json;
        content_by_lua_block {
            local cjson = require "cjson"
            local counters = ngx.shared.safeline_counters

            local data = {
                timestamp = ngx.time(),
                total_requests = tonumber(counters:get("total_requests") or 0) or 0,
                blocked_requests = tonumber(counters:get("blocked_requests") or 0) or 0,
                allowed_requests = 0,
                block_rate = 0,
                bucket_seconds = 10,
                sites = {},
                block_reasons = {},
                trend = setmetatable({}, cjson.array_mt)
            }

            local trend_map = {}
            local keys = counters:get_keys(10000)
            for _, key in ipairs(keys) do
                if key:sub(1, 14) == "site_requests:" then
                    local host = key:sub(15)
                    data.sites[host] = tonumber(counters:get(key) or 0) or 0
                elseif key:sub(1, 13) == "block_reason:" then
                    local reason = key:sub(14)
                    data.block_reasons[reason] = tonumber(counters:get(key) or 0) or 0
                elseif key:sub(1, 12) == "trend_total:" then
                    local ts = tonumber(key:sub(13))
                    if ts then
                        local row = trend_map[ts] or {
                            timestamp = ts,
                            total_requests = 0,
                            blocked_requests = 0
                        }
                        row.total_requests = tonumber(counters:get(key) or 0) or 0
                        trend_map[ts] = row
                    end
                elseif key:sub(1, 14) == "trend_blocked:" then
                    local ts = tonumber(key:sub(15))
                    if ts then
                        local row = trend_map[ts] or {
                            timestamp = ts,
                            total_requests = 0,
                            blocked_requests = 0
                        }
                        row.blocked_requests = tonumber(counters:get(key) or 0) or 0
                        trend_map[ts] = row
                    end
                end
            end

            local trend = {}
            for _, row in pairs(trend_map) do
                table.insert(trend, row)
            end
            table.sort(trend, function(a, b)
                return (a.timestamp or 0) < (b.timestamp or 0)
            end)
            if #trend > 720 then
                local start_idx = #trend - 719
                local trimmed = {}
                for i = start_idx, #trend do
                    table.insert(trimmed, trend[i])
                end
                trend = trimmed
            end
            data.trend = trend

            data.allowed_requests = math.max(0, data.total_requests - data.blocked_requests)
            if data.total_requests > 0 then
                data.block_rate = data.blocked_requests / data.total_requests
            end

            ngx.say(cjson.encode({
                success = true,
                data = data
            }))
        }
    }

    location /safeline-static/ {
        alias /usr/local/openresty/nginx/lua/static/;
        expires 30d;
    }

    location /safeline-api/ {
        content_by_lua_block {
            require("captcha").handle()
        }
    }

    location = /pow {
        default_type text/html;
        content_by_lua_block {
            local pow = require "pow"
            ngx.header.content_type = "text/html; charset=utf-8"
            ngx.say(pow.get_pow_script())
        }
    }

    location /pow/ {
        content_by_lua_block {
            require("captcha").handle()
        }
    }

    location /safeline-admin-api/ {
        proxy_pass http://admin-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        default_type text/html;
        return 404 "<html><head><title>SafeLine WAF</title></head><body><h1>No matching site</h1><p>Please configure this host in the admin panel.</p></body></html>";
    }
}

server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /usr/local/openresty/nginx/conf/default-certs/default.crt;
    ssl_certificate_key /usr/local/openresty/nginx/conf/default-certs/default.key;

    default_type text/html;
    return 404 "<html><head><title>SafeLine WAF</title></head><body><h1>No matching site</h1><p>No matching site for this Host header.</p></body></html>";
}
