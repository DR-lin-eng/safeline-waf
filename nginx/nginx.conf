worker_processes auto;
worker_rlimit_nofile 65535;
pid /tmp/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Docker Compose service-name resolution for Lua cosockets (Redis Pub/Sub, etc.).
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    # 优化配置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 20m;
    client_body_buffer_size 128k;

    # 日志设置
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     '$request_time $upstream_response_time';

    access_log /dev/stdout main;
    error_log stderr warn;

    # Gzip压缩
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 连接/慢速攻击基础防护（优先在Nginx层拦截，减少Lua路径开销）
    client_header_timeout 5s;      # Slowloris: 整个头部必须在5秒内完整到达
    client_body_timeout 10s;
    send_timeout 10s;
    reset_timedout_connection on;
    keepalive_timeout 30s;         # 从默认65降低，减少CC攻击时连接占用时间
    keepalive_requests 200;        # 从默认1000降低，防止攻击者复用keep-alive连接发海量请求
    large_client_header_buffers 4 8k;  # 从16k降低，限制超大Header DoS
    lingering_time  10s;           # 连接排水最多等待10秒
    lingering_timeout 3s;          # 排水超过3秒没有新数据直接关闭（缩短Slowloris生存时间）

    # limit_req / limit_conn 超限时直接关闭连接，不发送任何响应（节省带宽和CPU）
    limit_conn_status 444;
    limit_req_status  444;
    limit_conn_log_level warn;
    limit_req_log_level  warn;

    # HTTP/2 limits
    http2_max_concurrent_streams 64;

    # WebSocket Upgrade helper
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      "";
    }

    # 基础限流/限连（更适合防 storm/连接风暴/SSL握手压力；业务可在站点级再细化）
    limit_conn_zone $binary_remote_addr zone=safeline_conn_per_ip:10m;
    limit_conn_zone $server_addr        zone=safeline_conn_total:5m;   # 全局并发连接总数（防止资源耗尽）
    limit_req_zone  $binary_remote_addr zone=safeline_req_per_ip:20m rate=50r/s;

    # TLS/SSL基础优化（仅在启用HTTPS的server中生效）
    ssl_session_cache shared:SSL:20m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    # 优先使用服务端密码套件（TLS 1.2兼容配置）
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    # OCSP Stapling 可减少TLS握手延迟（需配合有效CA链证书）
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # Lua设置
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/nginx/lua/?/init.lua;;";
    lua_shared_dict safeline_config 10m;
    lua_shared_dict safeline_cache 50m;
    lua_shared_dict safeline_limit 64m;    # 增至64m：大规模CC时攻击IP数×URL数会快速耗尽20m
    lua_shared_dict safeline_blacklist 10m;
    lua_shared_dict safeline_counters 10m;
    lua_shared_dict safeline_bloom 5m;
    lua_shared_dict safeline_ml 20m;
    
    # 初始化Lua脚本
    init_by_lua_file lua/init.lua;
    init_worker_by_lua_file lua/init_worker.lua;
    
    # 包含站点配置
    include conf.d/*.conf;
}
