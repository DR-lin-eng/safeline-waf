# 生产部署用 compose（拉取 GHCR 预构建镜像，无需本地编译）
# 用法:
#   export SAFELINE_TAG=main          # 或指定版本 v1.2.3
#   docker compose -f docker-compose.prod.yml up -d
#
# 首次部署前建议设置以下环境变量（或写入 .env 文件）：
#   REDIS_PASSWORD   — Redis 密码（默认值仅用于测试）
#   JWT_SECRET       — JWT 签名密钥，至少 32 字符
#   ADMIN_PASSWORD_HASH — bcrypt 密码哈希，生成命令：
#     node -e "require('bcryptjs').hash('YourPassword',12).then(console.log)"

x-image-base: &image-base
  ghcr.io/dr-lin-eng

services:
  nginx:
    image: ghcr.io/dr-lin-eng/safeline-nginx:${SAFELINE_TAG:-main}
    container_name: safeline-waf-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx/conf.d:/usr/local/openresty/nginx/conf/conf.d:ro
      - ./nginx/lua:/usr/local/openresty/nginx/lua:ro
      - ./config:/usr/local/openresty/nginx/conf/config:ro
      - ./logs:/usr/local/openresty/nginx/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET
      - NODE_ID=${NODE_ID:-node-1}
      - NODE_ROLE=${NODE_ROLE:-secondary}
      - CLUSTER_ENABLED=${CLUSTER_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - safeline-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/_metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: safeline-waf-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - safeline-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  admin-backend:
    image: ghcr.io/dr-lin-eng/safeline-admin-backend:${SAFELINE_TAG:-main}
    container_name: safeline-waf-admin-backend
    expose:
      - "3000"
    volumes:
      - ./config:/app/config
      - ./nginx/conf.d:/nginx/conf.d
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD
      - NGINX_RELOAD_URL=http://nginx:80/_reload
      - NGINX_METRICS_URL=http://nginx:80/_metrics
      - NGINX_CONF_DIR=/nginx/conf.d
      - UPDATER_URL=http://admin-updater:3100
      - UPDATER_SHARED_SECRET=${UPDATER_SHARED_SECRET:-}
      - UPDATER_SHARED_TOKEN=${UPDATER_SHARED_TOKEN:-}
      - JWT_SECRET
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD_HASH
      - NODE_ENV=${NODE_ENV:-production}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8080}
      - NODE_ID=${NODE_ID:-node-1}
      - NODE_ROLE=${NODE_ROLE:-secondary}
      - CLUSTER_ENABLED=${CLUSTER_ENABLED:-false}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - safeline-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin-updater:
    image: ghcr.io/dr-lin-eng/safeline-admin-updater:${SAFELINE_TAG:-main}
    container_name: safeline-waf-admin-updater
    expose:
      - "3100"
    volumes:
      - .:${UPDATER_WORKSPACE_DIR:-/opt/safeline-waf}:ro
      - ./data/updater:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PORT=3100
      - JWT_SECRET
      - SAFELINE_TAG=${SAFELINE_TAG:-main}
      - UPDATER_SHARED_SECRET=${UPDATER_SHARED_SECRET:-}
      - UPDATER_SHARED_TOKEN=${UPDATER_SHARED_TOKEN:-}
      - UPDATER_WORKDIR=${UPDATER_WORKSPACE_DIR:-/opt/safeline-waf}
      - UPDATER_STATE_DIR=/data
      - UPDATER_RUNNER_STATE_DIR=${UPDATER_WORKSPACE_DIR:-/opt/safeline-waf}/data/updater
      - UPDATER_COMPOSE_FILE=docker-compose.prod.yml
      - UPDATER_FALLBACK_COMPOSE_FILE=docker-compose.yml
      - UPDATER_PULL_SOURCE=${UPDATER_PULL_SOURCE:-true}
      - UPDATER_GIT_REMOTE=${UPDATER_GIT_REMOTE:-origin}
      - UPDATER_GIT_BRANCH=${UPDATER_GIT_BRANCH:-main}
      - UPDATER_SERVICES=nginx,redis,admin-backend,admin-frontend,admin-updater
      - UPDATER_RUNNER_IMAGE=ghcr.io/dr-lin-eng/safeline-admin-updater:${SAFELINE_TAG:-main}
    restart: always
    networks:
      - safeline-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  admin-frontend:
    image: ghcr.io/dr-lin-eng/safeline-admin-frontend:${SAFELINE_TAG:-main}
    container_name: safeline-waf-admin-frontend
    ports:
      - "${ADMIN_PORT:-8080}:80"
    depends_on:
      admin-backend:
        condition: service_healthy
    restart: always
    networks:
      - safeline-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  safeline-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
